<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="promptingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yamlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pluginsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#1a1a1a" text-anchor="middle">Courbe d'apprentissage de l'équipe</text>
  
  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="380" stroke="#666" stroke-width="2"/>
  <text x="60" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle" transform="rotate(-90, 60, 230)">Compétence</text>
  
  <!-- Y-axis labels -->
  <text x="90" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="end">Débutant</text>
  <text x="90" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="end">Intermédiaire</text>
  <text x="90" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="end">Expert</text>
  
  <!-- X-axis -->
  <line x1="100" y1="380" x2="750" y2="380" stroke="#666" stroke-width="2"/>
  <text x="425" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Semaines d'apprentissage</text>
  
  <!-- X-axis labels -->
  <text x="100" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">0</text>
  <text x="210" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">1</text>
  <text x="320" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">2</text>
  <text x="430" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">3</text>
  <text x="540" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">4</text>
  <text x="650" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">5</text>
  <text x="750" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">6</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="250" x2="750" y2="250" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="115" x2="750" y2="115" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- YAML Config curve (green) - 1 week to expert -->
  <path d="M100,370 Q155,200 210,120" 
        stroke="url(#yamlGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="92" y="362" width="16" height="16" fill="#22c55e" rx="2"/>
  <rect x="202" y="112" width="16" height="16" fill="#22c55e" rx="2"/>
  
  <!-- Prompting curve (blue) - 2-3 weeks -->
  <path d="M100,370 Q160,360 210,300 Q280,200 320,160" 
        stroke="url(#promptingGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="370" r="8" fill="#3b82f6"/>
  <circle cx="210" cy="300" r="8" fill="#3b82f6"/>
  <circle cx="320" cy="160" r="8" fill="#3b82f6"/>
  
  <!-- Plugins curve (orange) - 3-4 weeks -->
  <path d="M100,370 Q180,365 210,340 Q280,280 320,200 Q380,130 430,120" 
        stroke="url(#pluginsGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="100,362 108,378 92,378" fill="#f59e0b"/>
  <polygon points="210,332 218,348 202,348" fill="#f59e0b"/>
  <polygon points="320,192 328,208 312,208" fill="#f59e0b"/>
  <polygon points="430,112 438,128 422,128" fill="#f59e0b"/>
  
  <!-- Legend -->
  <rect x="150" y="445" width="500" height="45" fill="#fff" stroke="#ddd" rx="8"/>
  
  <!-- YAML Config legend (first - 1 week) -->
  <rect x="170" y="459" width="16" height="16" fill="#22c55e" rx="2"/>
  <text x="193" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a1a1a">YAML Config</text>
  <text x="193" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#666">(1 sem.)</text>
  
  <!-- Prompting legend (second - 2-3 weeks) -->
  <circle cx="295" cy="467" r="8" fill="#3b82f6"/>
  <text x="310" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a1a1a">Prompting</text>
  <text x="310" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#666">(2-3 sem.)</text>
  
  <!-- Plugins legend (third - 3-4 weeks) -->
  <polygon points="410,459 418,475 402,475" fill="#f59e0b"/>
  <text x="428" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a1a1a">Plugins</text>
  <text x="428" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#666">(3-4 sem.)</text>
</svg>